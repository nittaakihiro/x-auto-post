name: Send Dashboard to Slack

on:
  push:
    paths:
      - 'output/post_queue.json'
      - 'output/dashboard.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Generate and send Slack message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: U01PHHAB887
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).strftime("%Y-%m-%d")
          today_jp = datetime.now(JST).strftime("%Y年%-m月%-d日")
          weekdays = ["月", "火", "水", "木", "金", "土", "日"]
          day_of_week = weekdays[datetime.now(JST).weekday()]

          # Load queue
          with open("output/post_queue.json", "r") as f:
              queue = json.load(f)
          today_posts = [p for p in queue if p["date"] == today and p["status"] == "pending"]

          # Load dashboard (engage cards + reply sales)
          dashboard = {}
          dash_path = Path("output/dashboard.json")
          if dash_path.exists():
              with open(dash_path, "r") as f:
                  dashboard = json.load(f)

          engage_cards = dashboard.get("engage_cards", [])
          reply_sales = dashboard.get("reply_sales", [])

          if not today_posts and not engage_cards:
              print("今日のコンテンツなし。スキップ。")
              exit(0)

          def slack_api(method, payload):
              req = urllib.request.Request(
                  f"https://slack.com/api/{method}",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {os.environ['SLACK_BOT_TOKEN']}",
                      "Content-Type": "application/json; charset=utf-8"
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          # Open DM
          open_result = slack_api("conversations.open", {"users": os.environ["SLACK_USER_ID"]})
          if not open_result.get("ok"):
              print(f"DM open失敗: {open_result.get('error')}")
              exit(1)
          dm_channel = open_result["channel"]["id"]

          # === Build blocks ===
          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"📋 X Dashboard — {today_jp}（{day_of_week}）"}},
              {"type": "divider"}
          ]

          # --- オリジナル投稿 ---
          if today_posts:
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": "*🖊️ オリジナル投稿（自動投稿）*"}})
              for p in sorted(today_posts, key=lambda x: x["time"]):
                  freshness = "🔒" if p.get("freshness") == "locked" else "🔄"
                  img = "🖼️" if p.get("image", {}).get("type") == "gemini" else ""
                  blocks.append({
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"*{p['time']}* {freshness} {img} — {len(p['text'])}字\n\n{p['text']}"}
                  })
                  if p.get("reply") and p["reply"].get("text"):
                      blocks.append({
                          "type": "context",
                          "elements": [{"type": "mrkdwn", "text": f"💬 *リプ:* {p['reply']['text']}"}]
                      })
                  blocks.append({"type": "divider"})

          # --- 絡みカード（手動投稿） ---
          if engage_cards:
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": "*🤝 絡み候補（手動投稿）*"}})
              for i, card in enumerate(engage_cards, 1):
                  card_type = card.get("action_type", card.get("type", "reply"))
                  tier = card.get("tier", "")
                  target = card.get("target", "")
                  name = card.get("name", "")
                  url = card.get("target_post_url", card.get("url", ""))
                  summary = card.get("target_summary", "")
                  text = card.get("text", "")
                  label = "引用RT" if "quote" in card_type else "リプ"
                  header = f"*{i}. [{label}] {target}*"
                  if name:
                      header += f" ({name})"
                  if tier:
                      header += f" [{tier} tier]"
                  line = header
                  if url:
                      line += f"\n{url}"
                  if summary:
                      line += f"\n> {summary}"
                  line += f"\n\n💬 {text}"
                  blocks.append({
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": line}
                  })
                  blocks.append({"type": "divider"})

          # --- リプ営業（手動投稿） ---
          if reply_sales:
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": "*📣 リプ営業候補（手動投稿）*"}})
              for i, rs in enumerate(reply_sales, 1):
                  target = rs.get("target_description", rs.get("url", ""))
                  query = rs.get("search_query", "")
                  text = rs.get("reply_text", rs.get("text", ""))
                  line = f"{i}. *{target}*"
                  if query:
                      line += f"\n検索: `{query}`"
                  line += f"\n💬 {text}"
                  blocks.append({
                      "type": "context",
                      "elements": [{"type": "mrkdwn", "text": line}]
                  })
              blocks.append({"type": "divider"})

          # --- サマリー ---
          summary_parts = []
          if today_posts:
              summary_parts.append(f"📝 オリジナル{len(today_posts)}本（自動投稿）")
          if engage_cards:
              summary_parts.append(f"🤝 絡み{len(engage_cards)}本（手動）")
          if reply_sales:
              summary_parts.append(f"📣 リプ営業{len(reply_sales)}件（手動）")
          blocks.append({
              "type": "context",
              "elements": [{"type": "mrkdwn", "text": " | ".join(summary_parts)}]
          })

          # === Send ===
          # Slack blocks limit is 50, split if needed
          MAX_BLOCKS = 50
          for i in range(0, len(blocks), MAX_BLOCKS):
              chunk = blocks[i:i+MAX_BLOCKS]
              result = slack_api("chat.postMessage", {
                  "channel": dm_channel,
                  "blocks": chunk,
                  "text": f"X Dashboard — {today_jp}（{day_of_week}）"
              })
              if not result.get("ok"):
                  print(f"Slack送信失敗: {result.get('error')}")
                  exit(1)

          print(f"Slack送信成功: {today_jp}")
          PYEOF
