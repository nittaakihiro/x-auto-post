name: X Auto Post

on:
  schedule:
    # JST = UTC+9
    # GitHub Actions schedule は最大1時間級の遅延があるため、各投稿枠で前倒し+定時+予備の3発打つ。
    # auto_post.py は posted 済みを再投稿しないため、多重実行しても二重投稿にならない。
    #
    # 7:30 JST 投稿枠
    - cron: '25 22 * * *'   # 07:25 JST
    - cron: '45 22 * * *'   # 07:45 JST
    - cron: '5 23 * * *'    # 08:05 JST
    # 12:00 JST 投稿枠
    - cron: '55 2 * * *'    # 11:55 JST
    - cron: '15 3 * * *'    # 12:15 JST
    - cron: '35 3 * * *'    # 12:35 JST
    # 20:00 JST 投稿枠
    - cron: '55 10 * * *'   # 19:55 JST
    - cron: '15 11 * * *'   # 20:15 JST
    - cron: '35 11 * * *'   # 20:35 JST
    # リプライ回収（20:00枠のリプが翌日に回るのを防止）
    - cron: '50 11 * * *'   # 20:50 JST
  workflow_dispatch: # 手動実行用
permissions:
  contents: write
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run auto_post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_post.py

      - name: Commit queue updates
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/post_queue.json
          git diff --cached --quiet || git commit -m "update: post queue status"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
